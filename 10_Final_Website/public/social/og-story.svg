<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <radialGradient id="a1" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#5B6CFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#5B6CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a2" cx="70%" cy="75%" r="60%">
      <stop offset="0%" stop-color="#9A6CFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9A6CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a3" cx="20%" cy="85%" r="50%">
      <stop offset="0%" stop-color="#6CC8FF" stop-opacity="0.09"/>
