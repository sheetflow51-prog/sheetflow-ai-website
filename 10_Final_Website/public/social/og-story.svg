  <!-- Live dot -->
  <circle cx="484" cy="1790" r="5" fill="#10B981"/>
  <text x="500" y="1795" font-family="ui-monospace, monospace" font-size="14" letter-spacing="0.12em" fill="#FFFFFF" opacity="0.4">LIVE · sheetflow.ai</text>

  <rect width="1080" height="1920" fill="url(#vignette)"/>
