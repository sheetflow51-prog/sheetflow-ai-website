  <rect width="1080" height="1920" fill="url(#a2)"/>
  <rect width="1080" height="1920" fill="url(#a3)"/>

  <!-- Brackets -->
  <path d="M 56 56 L 56 108 M 56 56 L 108 56" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.65"/>
  <path d="M 1024 56 L 1024 108 M 1024 56 L 972 56" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.65"/>
  <path d="M 56 1864 L 56 1812 M 56 1864 L 108 1864" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.65"/>
  <path d="M 1024 1864 L 1024 1812 M 1024 1864 L 972 1864" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.65"/>

  <!-- Central geometric at mid-height -->
  <g transform="translate(540, 960)" opacity="0.15">
    <polygon points="0,-280 243,-140 243,140 0,280 -243,140 -243,-140" stroke="#818CF8" stroke-width="0.8" fill="none"/>
    <polygon points="0,-168 146,-84 146,84 0,168 -146,84 -146,-84" stroke="#818CF8" stroke-width="0.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="320" ry="56" stroke="#5B6CFF" stroke-width="0.7" fill="none"/>
    <ellipse cx="0" cy="0" rx="410" ry="72" stroke="#5B6CFF" stroke-width="0.5" fill="none"/>
    <ellipse cx="0" cy="0" rx="510" ry="92" stroke="#5B6CFF" stroke-width="0.35" fill="none"/>
  </g>

  <!-- Glow at center -->
  <rect y="600" width="1080" height="720" fill="url(#glow)"/>

  <!-- Logo mark -->
  <circle cx="540" cy="220" r="34" stroke="#818CF8" stroke-width="1" fill="none" opacity="0.5"/>
  <line x1="516" y1="212" x2="564" y2="212" stroke="#818CF8" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="516" y1="220" x2="564" y2="220" stroke="#818CF8" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="516" y1="228" x2="564" y2="228" stroke="#818CF8" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="540" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" letter-spacing="-0.3" fill="#FFFFFF" opacity="0.85">SheetFlow.AI</text>

  <!-- Headline - lower third style -->
  <text x="540" y="1520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" letter-spacing="-2.5" fill="url(#hl)">Your data,</text>
  <text x="540" y="1618" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" letter-spacing="-2.5" fill="url(#ag)">finally alive.</text>

